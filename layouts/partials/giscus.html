{{ with .Site.Params.giscus }}
<section class="giscus-section mt-8 rounded-2xl border border-line bg-panel p-6 md:p-8">
  <h2 class="font-display text-xl font-bold text-ink mb-1">Retroalimentacion</h2>
  <div class="h-0.5 w-10 bg-orange-500 mb-6"></div>
  <p class="mb-5 text-sm text-ink/60">Deja tu comentario o reaccion usando tu cuenta de GitHub. Las discusiones quedan registradas en el repositorio del proyecto.</p>
  <div class="giscus"></div>
  <script
    src="https://giscus.app/client.js"
    data-repo="{{ .repo }}"
    data-repo-id="{{ .repo_id }}"
    data-mapping="{{ .mapping | default "pathname" }}"
    {{ if eq (.mapping | default "pathname") "number" }}data-term="{{ .term }}"{{ end }}
    {{ with .category }}data-category="{{ . }}"{{ end }}
    {{ with .category_id }}data-category-id="{{ . }}"{{ end }}
    data-strict="0"
    data-reactions-enabled="{{ .reactions | default "1" }}"
    data-emit-metadata="{{ .emit_metadata | default "0" }}"
    data-input-position="bottom"
    data-theme="{{ .theme_light | default "preferred_color_scheme" }}"
    data-lang="es"
    crossorigin="anonymous"
    async>
  </script>
  <script>
    (function () {
      function applyGiscusTheme() {
        var isDark = document.documentElement.getAttribute("data-theme") === "dark";
        var theme = isDark ? {{ .theme_dark | default "dark_dimmed" | jsonify }} : {{ .theme_light | default "light" | jsonify }};
        var iframe = document.querySelector("iframe.giscus-frame");
        if (iframe) {
          iframe.contentWindow.postMessage(
            { giscus: { setConfig: { theme: theme } } },
            "https://giscus.app"
          );
        }
      }
      var observer = new MutationObserver(function (muts) {
        muts.forEach(function (m) {
          if (m.attributeName === "data-theme") applyGiscusTheme();
        });
      });
      observer.observe(document.documentElement, { attributes: true });
    })();
  </script>
</section>
{{ end }}
