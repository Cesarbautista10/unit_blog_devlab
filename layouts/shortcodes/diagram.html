{{ $src     := .Get "src" }}
{{ $caption := .Get "caption" | default "" }}
{{ $type    := .Get "type"    | default "image" }}
{{ $height  := .Get "height"  | default "520" }}
{{ $alt     := .Get "alt"     | default $caption }}

<figure class="my-6 w-full">
  {{ if eq $type "pdf" }}
    {{/* PDF embed */}}
    <div class="overflow-hidden rounded-xl border border-line bg-panelSoft" style="height:{{ $height }}px">
      <iframe
        src="{{ $src }}#toolbar=0&navpanes=0&scrollbar=1"
        class="h-full w-full"
        title="{{ $caption | default "Diagrama" }}"
        loading="lazy"
      ></iframe>
    </div>
    <div class="mt-2 flex items-center justify-between gap-3">
      {{ if $caption }}
        <p class="text-xs text-ink/50 italic">{{ $caption }}</p>
      {{ end }}
      <a href="{{ $src }}" target="_blank" rel="noopener"
        class="ml-auto flex-shrink-0 rounded-lg border border-line bg-panelSoft px-3 py-1.5 text-xs font-semibold text-ink/70 hover:text-ink transition-colors">
        Abrir PDF ↗
      </a>
    </div>

  {{ else if eq $type "svg" }}
    {{/* SVG embed */}}
    <div class="overflow-auto rounded-xl border border-line bg-white p-4">
      <img src="{{ $src }}" alt="{{ $alt }}" loading="lazy"
        data-expandable="true"
        class="mx-auto max-h-[{{ $height }}px] w-full cursor-zoom-in object-contain" />
    </div>
    {{ if $caption }}
      <figcaption class="mt-2 text-center text-xs text-ink/50 italic">{{ $caption }}</figcaption>
    {{ end }}

  {{ else }}
    {{/* Default: image diagram with diagram styling */}}
    <div class="overflow-hidden rounded-xl border border-line bg-white p-3">
      <img src="{{ $src }}" alt="{{ $alt }}" loading="lazy"
        data-expandable="true"
        class="mx-auto cursor-zoom-in object-contain transition duration-300 hover:opacity-95"
        style="max-height:{{ $height }}px; width:100%;" />
    </div>
    {{ if $caption }}
      <figcaption class="mt-2 text-center text-xs text-ink/50 italic">{{ $caption }}</figcaption>
    {{ end }}
  {{ end }}
</figure>
