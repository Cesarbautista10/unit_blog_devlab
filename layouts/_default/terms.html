{{ define "main" }}
<section class="rounded-xl border border-line bg-panel p-6 md:p-8">
  <h1 class="font-display text-3xl font-bold text-ink md:text-4xl">{{ .Title }}</h1>
</section>

{{ if gt (len .Data.Terms.Alphabetical) 0 }}
  <div class="mt-6 grid gap-4 md:grid-cols-2 xl:grid-cols-3">
    {{ range .Data.Terms.Alphabetical }}
      <article class="rounded-lg border border-line bg-panel p-5 transition hover:bg-panelSoft">
        <h2 class="font-display text-2xl font-bold text-ink"><a href="{{ .Page.RelPermalink }}" class="hover:underline">{{ .Page.Title }}</a></h2>
        <p class="mt-2 text-sm text-ink/75">{{ .Count }} publicaciones</p>
      </article>
    {{ end }}
  </div>
{{ else }}
  <p class="mt-6 rounded-lg border border-dashed border-line bg-panel p-4 text-sm text-ink/75">No hay terminos registrados.</p>
{{ end }}
{{ end }}
